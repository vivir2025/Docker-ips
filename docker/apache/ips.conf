# Configuración de Apache para aplicación Cajibío
# Servida desde subdirectorio /cajibio/

Alias /cajibio /var/www/html

<Directory /var/www/html>
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
    
    # Habilitar rewrite para CodeIgniter
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /cajibio/
        
        # Redirigir todo excepto archivos/directorios existentes a index.php
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php/$1 [L]
    </IfModule>
</Directory>
