server {
    listen 80;
    server_name localhost;

    # Logs
    access_log /var/log/nginx/ips_access.log;
    error_log /var/log/nginx/ips_error.log;

    # Tamaño máximo de carga
    client_max_body_size 64M;

    # Redirigir raíz a Cajibío por defecto
    location = / {
        return 301 /cajibio/;
    }

    # Aplicación Cajibío
    location /cajibio/ {
        proxy_pass http://cajibio_app:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # ---
        # Para activar Piéndamo o Morales, descomentá las siguientes secciones:
        
        # location /piendamo/ {
        #     proxy_pass http://piendamo_app:80/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Forwarded-Host $host;
        #     proxy_set_header X-Forwarded-Port $server_port;
            
        #     proxy_connect_timeout 600s;
        #     proxy_send_timeout 600s;
        #     proxy_read_timeout 600s;
        #     send_timeout 600s;
            
        #     proxy_buffering on;
        #     proxy_buffer_size 4k;
        #     proxy_buffers 8 4k;
        #     proxy_busy_buffers_size 8k;
        # }
        
        proxy_set_header X-Forwarded-Proto $scheme;
        # location /morales/ {
        #     proxy_pass http://morales_app:80/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Forwarded-Host $host;
        #     proxy_set_header X-Forwarded-Port $server_port;
        #     
        #     proxy_connect_timeout 600s;
        #     proxy_send_timeout 600s;
        #     proxy_read_timeout 600s;
        #     send_timeout 600s;
        #     
        #     proxy_buffering on;
        #     proxy_buffer_size 4k;
        #     proxy_buffers 8 4k;
        #     proxy_busy_buffers_size 8k;
        # }
        # ---
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Optimización para archivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://cajibio_app:80;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Denegar acceso a archivos sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
